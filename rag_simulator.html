<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG Simulator</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Inter, Arial, sans-serif;
    }

    body {
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 24px;
    }

    h1 {
      font-size: 2.2rem;
      margin-bottom: 10px;
    }

    .subtitle {
      color: #94a3b8;
      margin-bottom: 28px;
    }

    .layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 20px;
    }

    .panel {
      background: #111827;
      border: 1px solid #1e293b;
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    .panel h2 {
      margin-bottom: 16px;
      font-size: 1.2rem;
    }

    textarea, input {
      width: 100%;
      background: #1e293b;
      color: white;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 12px;
      resize: vertical;
    }

    button {
      width: 100%;
      border: none;
      padding: 12px;
      border-radius: 12px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s ease;
      margin-bottom: 10px;
    }

    button:hover {
      transform: translateY(-2px);
    }

    .workflow {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 16px;
      margin-bottom: 20px;
    }

    .step {
      background: #111827;
      border: 1px solid #1e293b;
      border-radius: 16px;
      padding: 16px;
      position: relative;
      overflow: hidden;
    }

    .step.active {
      border-color: #3b82f6;
      box-shadow: 0 0 20px rgba(59,130,246,0.3);
    }

    .step-number {
      width: 34px;
      height: 34px;
      background: #3b82f6;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      margin-bottom: 12px;
    }

    .step h3 {
      margin-bottom: 10px;
    }

    .step p {
      font-size: 0.92rem;
      color: #94a3b8;
      line-height: 1.5;
    }

    .content-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .card {
      background: #111827;
      border: 1px solid #1e293b;
      border-radius: 18px;
      padding: 20px;
    }

    .card h3 {
      margin-bottom: 14px;
    }
